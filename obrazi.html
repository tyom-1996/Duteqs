    <script src="js/header.js"></script>

    <script>
        // Catalog filter tabs
        const tabs = document.querySelectorAll(".catalog-filters__tab");
        tabs.forEach((tab) => {
            tab.addEventListener("click", () => {
                tabs.forEach((t) =>
                    t.classList.remove("catalog-filters__tab--active"),
                );
                tab.classList.add("catalog-filters__tab--active");
            });
        });

        // Look card hover effect
        document.querySelectorAll(".look-card").forEach((card) => {
            card.addEventListener("mouseenter", () => {
                card.classList.add("look-card--hover");
            });
            card.addEventListener("mouseleave", () => {
                card.classList.remove("look-card--hover");
            });
        });

        // Load More functionality for Looks Grid
        const lookCards = document.querySelectorAll(".look-card");
        const loadMoreBtn = document.querySelector(".looks-load-more__btn");
        const loadMoreWrapper = document.getElementById("looks-load-more");
        let initialCardsToShow = 4;

        // Hide cards initially
        lookCards.forEach((card, index) => {
            if (index >= initialCardsToShow) {
                card.style.display = "none";
            }
        });

        if (lookCards.length <= initialCardsToShow && loadMoreWrapper) {
            loadMoreWrapper.style.display = "none";
        }

        if (loadMoreBtn) {
            loadMoreBtn.addEventListener("click", () => {
                lookCards.forEach(card => {
                    card.style.display = "flex"; // Reset back to flex
                });

                // Hide the load more wrapper entirely instead of just button
                if (loadMoreWrapper) {
                    loadMoreWrapper.style.display = "none";
                }
            });
        }
    </script>
