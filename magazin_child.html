    <div class="filter-popup" id="filter-popup">
      <div class="filter-popup__overlay" id="filter-popup-overlay"></div>
      <div class="filter-popup__content">
        <div class="filter-popup__header">

          </button>
        </div>

        <div class="filter-popup__body">
          <div class="filter-popup__section">
            <h3 class="filter-popup__section-title">Сортировать по:</h3>

              <label class="filter-popup__sort-label">
                <span class="filter-popup__sort-text">Дате</span>
                <img src="svg/icon-date.svg" alt="" width="24" height="24"

                <span class="filter-popup__sort-icon"></span>

            </div>
            <div class="filter-popup__sort-links">

            </div>

                <label class="filter-popup__color-option">

                  <span class="filter-popup__color-circle">
                    <img src="svg/check-white.svg" alt="" class="filter-popup__color-check" />
                  </span>
                  <span class="filter-popup__color-text">Цвет 2</span>

                <label class="filter-popup__color-option">

                  <span class="filter-popup__color-circle">

                  <span class="filter-popup__color-circle">

  <!-- ===== FOOTER (loaded from component) ===== -->

  <script src="js/newsletter.js"></script>
  <script>
    // Catalog filter tabs
    const tabs = document.querySelectorAll(".catalog-filters__tab");
    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) =>
          t.classList.remove("catalog-filters__tab--active"),
        );
        tab.classList.add("catalog-filters__tab--active");
      });
    });

    // Filter Popup logic
    const filterBtn = document.getElementById("filter-btn");
    const filterPopup = document.getElementById("filter-popup");
    const filterPopupClose = document.getElementById("filter-popup-close");
    const filterPopupOverlay = document.getElementById(
      "filter-popup-overlay",
    );
    const filterApply = document.getElementById("filter-apply");
    const filterClear = document.getElementById("filter-clear");

    function openFilterPopup() {
      filterPopup.classList.add("filter-popup--open");
      document.body.style.overflow = "hidden";
    }

    function closeFilterPopup() {
      filterPopup.classList.remove("filter-popup--open");
      document.body.style.overflow = "";
    }

    if (filterBtn && filterPopup) {
      filterBtn.addEventListener("click", openFilterPopup);
      filterPopupClose.addEventListener("click", closeFilterPopup);
      filterPopupOverlay.addEventListener("click", closeFilterPopup);
      if (filterApply)
        filterApply.addEventListener("click", closeFilterPopup);
    }

    // Clear all filters
    if (filterClear) {
      filterClear.addEventListener("click", () => {
        const popup = document.getElementById("filter-popup");
        popup.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        popup.querySelectorAll('input[type="radio"]').forEach(rb => rb.checked = false);
        const dateRadio = popup.querySelector('input[name="sort"][value="date"]');
        if (dateRadio) dateRadio.checked = true;
        popup.querySelectorAll(".filter-popup__sort-link").forEach((link, i) => {
          link.classList.toggle("filter-popup__sort-link--active", i === 0);
        });
      });
    }

    // Accordion toggle helper
    function setupAccordionToggle(btnId) {
      const btn = document.getElementById(btnId);
      if (btn) {
        btn.addEventListener("click", () => {
          const item = btn.closest(".filter-popup__accordion-item");
          const icon = btn.querySelector(".filter-popup__accordion-icon");
          const isOpen = item.classList.toggle("filter-popup__accordion-item--open");
          icon.src = isOpen ? "svg/filter-minus.svg" : "svg/filter-plus.svg";
        });
      }
    }
    setupAccordionToggle("color-accordion-btn");
    setupAccordionToggle("size-accordion-btn");
    setupAccordionToggle("material-accordion-btn");
    setupAccordionToggle("model-accordion-btn");



    // Product card hover effect
    document.querySelectorAll(".product-card").forEach((card) => {
      card.addEventListener("mouseenter", () => {
        card.classList.add("product-card--hover");
      });
      card.addEventListener("mouseleave", () => {
        card.classList.remove("product-card--hover");
      });
    });
  </script>
  <script src="js/cart-popup.js"></script>
