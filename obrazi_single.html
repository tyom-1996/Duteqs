    <script>
        // ===== Image gallery slider =====
        const galleryImages = [
            "images/obraz_img5.webp",
            "images/obraz_img1.webp",
            "images/obraz_img2.webp",
            "images/obraz_img3.webp",
            "images/obraz_img4.webp",
            "images/obraz_img20.webp"
        ];
        let currentSlide = 0;
        const heroImg = document.getElementById("look-hero-img");
        const dots = document.querySelectorAll(".look-detail__dot");
        const thumbs = document.querySelectorAll(".look-detail__thumb");
        const prevBtn = document.getElementById("look-prev");
        const nextBtn = document.getElementById("look-next");

        function updateSlider(index) {
            currentSlide = index;
            heroImg.src = galleryImages[index];

            // Update dots
            dots.forEach((dot, i) => {
                dot.classList.toggle("look-detail__dot--active", i === index);
            });

            // Update thumbnails (first 4 match indices 0-3 → gallery indices 0-3,
            // but the first thumb corresponds to gallery image at index 1, etc.)
            // Let's map: thumb 0→gallery 1, thumb 1→gallery 2, etc.
            // Actually, thumbnails show the first 4 sub-images and main is separately controlled.
            // Simply highlight if the index maps to a thumb
            thumbs.forEach((thumb, i) => {
                // Thumb i corresponds to gallery image i+1 (since index 0 is the main hero default)
                // Actually let's just map thumbnails to the gallery items directly
                thumb.classList.toggle("look-detail__thumb--active", i + 1 === index || (i === 0 && index === 0));
            });
        }

        prevBtn.addEventListener("click", () => {
            const newIndex = currentSlide === 0 ? galleryImages.length - 1 : currentSlide - 1;
            updateSlider(newIndex);
        });

        nextBtn.addEventListener("click", () => {
            const newIndex = currentSlide === galleryImages.length - 1 ? 0 : currentSlide + 1;
            updateSlider(newIndex);
        });

        dots.forEach((dot) => {
            dot.addEventListener("click", () => {
                updateSlider(parseInt(dot.dataset.index));
            });
        });

        thumbs.forEach((thumb) => {
            thumb.addEventListener("click", () => {
                const idx = parseInt(thumb.dataset.index);
                heroImg.src = thumb.querySelector("img").src;
                currentSlide = idx;
                thumbs.forEach(t => t.classList.remove("look-detail__thumb--active"));
                thumb.classList.add("look-detail__thumb--active");
                dots.forEach((d, i) => d.classList.toggle("look-detail__dot--active", i === idx));
            });
        });

        // ===== Touch swipe support for main image =====
        const mainImageEl = document.getElementById("look-main-image");
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let isSwiping = false;

        mainImageEl.addEventListener("touchstart", (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            isSwiping = false;
        }, { passive: true });

        mainImageEl.addEventListener("touchmove", (e) => {
            const diffX = Math.abs(e.changedTouches[0].screenX - touchStartX);
            const diffY = Math.abs(e.changedTouches[0].screenY - touchStartY);
            // If horizontal movement is dominant, prevent vertical scroll
            if (diffX > diffY && diffX > 10) {
                isSwiping = true;
                e.preventDefault();
            }
        }, { passive: false });

        mainImageEl.addEventListener("touchend", (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const swipeDistance = touchStartX - touchEndX;
            const threshold = 50;

            if (Math.abs(swipeDistance) > threshold) {
                if (swipeDistance > 0) {
                    // Swiped left → next slide
                    const newIndex = currentSlide === galleryImages.length - 1 ? 0 : currentSlide + 1;
                    updateSlider(newIndex);
                } else {
                    // Swiped right → previous slide
                    const newIndex = currentSlide === 0 ? galleryImages.length - 1 : currentSlide - 1;
                    updateSlider(newIndex);
                }
            }
        }, { passive: true });
    </script>
